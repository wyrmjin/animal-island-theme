name: Build and Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write signing certificate files
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          mkdir -p certificate
          echo "$CERTIFICATE_CHAIN" > certificate/chain.crt
          echo "$PRIVATE_KEY" > certificate/private.pem

      - name: Build and Sign Plugin
        run: ./gradlew signPlugin

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*-signed.zip
          generate_release_notes: true
